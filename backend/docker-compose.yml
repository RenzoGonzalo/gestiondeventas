services:
  postgres:
    image: postgres:16
    container_name: gestionventas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestionventas
    ports:
      - "5433:5432"
    volumes:
      - gestionventas_data:/var/lib/postgresql/data

volumes:
  gestionventas_data:
